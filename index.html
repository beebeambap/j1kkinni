<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>지끼니</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #faf7f2;
    --bg: #f0ebe3;
    --border: #d9cfc4;
    --ink: #2a2018;
    --muted: #9a8870;
    --accent: #c9a97a;
    --dashed: #c9bfb3;
    --ui-bg: #ffffff;
    --ui-border: #e5e0d8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
  }

  /* ── 탭 네비게이션 ── */
  .tab-nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    display: flex;
    align-items: stretch;
    padding: 0 20px;
    border-bottom: 1.5px solid var(--border);
    box-shadow: 0 1px 6px rgba(0,0,0,0.04);
  }

  .tab-logo {
    font-family: 'Nanum Pen Script', cursive;
    font-size: 22px;
    color: var(--ink);
    text-decoration: none;
    display: flex;
    align-items: center;
    padding: 12px 16px 12px 0;
    margin-right: 8px;
    border-right: 1px solid var(--border);
  }

  .tab-link {
    display: flex;
    align-items: center;
    padding: 0 16px;
    border-bottom: 2.5px solid transparent;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.15s;
    margin-bottom: -1.5px;
    white-space: nowrap;
  }

  .tab-link:hover { color: var(--ink); }

  .tab-link.active {
    color: var(--ink);
    border-bottom-color: var(--accent);
    font-weight: 700;
  }

  /* ── 허브 ── */
  .hub {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 49px);
    padding: 48px 20px 64px;
    gap: 48px;
  }

  .hub-header { text-align: center; }

  .hub-title {
    font-family: 'Nanum Pen Script', cursive;
    font-size: 64px;
    color: var(--ink);
    line-height: 1;
    margin-bottom: 12px;
  }

  .hub-sub {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  .hub-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    width: 100%;
    max-width: 540px;
  }

  @media (max-width: 480px) {
    .hub-cards { grid-template-columns: 1fr; }
    .hub-title { font-size: 52px; }
  }

  .hub-card {
    background: var(--ui-bg);
    border-radius: 20px;
    padding: 28px 24px 24px;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 8px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    border: 1.5px solid transparent;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }

  .hub-card::before {
    content: '';
    position: absolute; inset: 0;
    background-image: repeating-linear-gradient(
      0deg, transparent, transparent 27px,
      rgba(180,160,130,0.06) 27px, rgba(180,160,130,0.06) 28px
    );
    pointer-events: none;
  }

  .hub-card:hover {
    border-color: var(--accent);
    box-shadow: 0 4px 28px rgba(0,0,0,0.10);
    transform: translateY(-3px);
  }

  .hub-card-tag {
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .hub-card-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.25;
    margin-top: 2px;
  }

  .hub-card-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.8;
    flex: 1;
    margin-top: 4px;
  }

  .hub-card-arrow {
    font-size: 20px;
    color: var(--accent);
    margin-top: 8px;
  }

  .hub-footer {
    font-size: 11px;
    color: var(--dashed);
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>

<nav class="tab-nav">
  <span class="tab-logo">지끼니</span>
  <a href="calculator.html" class="tab-link">식비 계산기</a>
  <a href="template.html" class="tab-link">롱폼 PNG</a>
</nav>

<main class="hub">
  <div class="hub-header">
    <div class="hub-title">지끼니</div>
    <div class="hub-sub">먹는 게 남는 거라서</div>
  </div>

  <div class="hub-cards">
    <a href="calculator.html" class="hub-card">
      <div class="hub-card-tag">숏폼용</div>
      <div class="hub-card-title">식비<br>계산기</div>
      <div class="hub-card-desc">재료별 비용을 입력하고<br>인트로·아웃트로 카드를<br>이미지로 저장</div>
      <div class="hub-card-arrow">→</div>
    </a>
    <a href="template.html" class="hub-card">
      <div class="hub-card-tag">롱폼용</div>
      <div class="hub-card-title">가로형<br>템플릿</div>
      <div class="hub-card-desc">1920×1080 PNG 생성<br>영상 편집용 사이드<br>패널 배경 제작</div>
      <div class="hub-card-arrow">→</div>
    </a>
  </div>

  <div class="hub-footer">지끼니 툴킷</div>
</main>

</body>
</html>
