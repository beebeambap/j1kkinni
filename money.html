  .tab-link {

    align-items: center;
    padding: 0 16px;
    border-bottom: 2.5px solid transparent;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted-nav);
    text-decoration: none;
    transition: color 0.15s;
    margin-bottom: -1.5px;
    white-space: nowrap;
  }

  .tab-link:hover { color: var(--ink-nav); }

  .tab-link.active {

    border-bottom-color: var(--accent-nav);
    font-weight: 700;
  }

  /* ── 본문 ── */

    align-items: center;

  .page-title {

    letter-spacing: 0.12em;
    font-family: sans-serif;
    font-weight: 400;

  .section-label {

    font-family: sans-serif;

    font-size: 10px;

    font-family: sans-serif;
    letter-spacing: 0.06em;

<script>
  function downloadSVG(svgId, filename) {
    const svg = document.getElementById(svgId);
    const svgData = new XMLSerializer().serializeToString(svg);
    const canvas = document.createElement('canvas');
    const scale = 4;
    const w = svg.width.baseVal.value || parseInt(svg.getAttribute('width'));
    const h = svg.height.baseVal.value || parseInt(svg.getAttribute('height'));
    canvas.width = w * scale;
    canvas.height = h * scale;
    const ctx = canvas.getContext('2d');
    ctx.scale(scale, scale);
    ctx.clearRect(0, 0, w, h);
    const img = new Image();
    const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(svgBlob);
    img.onload = function() {
      ctx.drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      const a = document.createElement('a');
      a.download = filename + '.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    };
    img.src = url;
  }

  function downloadAll() {
    const ids = [
      ['coin-10',    '10원_동전'],
      ['coin-50',    '50원_동전'],
      ['coin-100',   '100원_동전'],
      ['coin-500',   '500원_동전'],
      ['bill-1000',  '1000원_지폐'],
      ['bill-5000',  '5000원_지폐'],
      ['bill-10000', '10000원_지폐'],
    ];
    ids.forEach(([id, name], i) => {
      setTimeout(() => downloadSVG(id, name), i * 300);
    });
  }
</script>
